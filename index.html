<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Still With You 💗</title>
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="theme-color" content="#000000" />
		<link rel="shortcut icon" type="image/png" href="images/favicon.png" />
		<link rel="icon" type="image/png" href="images/favicon.png" />
		<link rel="apple-touch-icon-precomposed" href="images/favicon.png" />
		<!-- Thư viện CSS Clip Path Helper -->
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/clippy.js/1.0.0/clippy.min.css" />
		<style>
			/* Khu vực demo ảnh dùng clip-path (tròn + trái tim) */
			.shape-gallery {
				display: flex;
				gap: 24px;
				justify-content: center;
				align-items: center;
				padding: 16px;
			}
			.shape-card {
				width: 240px;
				height: 240px;
				position: relative;
			}
			.shape-card img {
				width: 100%;
				height: 100%;
				object-fit: cover;
				display: block;
			}
			/* Ảnh tròn */
			.shape-circle img {
				border-radius: 50%;
			}
			/* Ảnh trái tim */
			.shape-heart img {
				clip-path: path("M 120 224 C 8 144 0 72 60 40 C 96 24 120 40 120 56 C 120 40 144 24 180 40 C 240 72 232 144 120 224 Z");
				-webkit-clip-path: path("M 120 224 C 8 144 0 72 60 40 C 96 24 120 40 120 56 C 120 40 144 24 180 40 C 240 72 232 144 120 224 Z");
			}
			/* Fallback mask cho trình duyệt cũ */
			@supports not (clip-path: path("M 120 224 C 8 144 0 72 60 40 C 96 24 120 40 120 56 C 120 40 144 24 180 40 C 240 72 232 144 120 224 Z")) {
				.shape-heart img {
					mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240"><path d="M120 224 C8 144 0 72 60 40 C96 24 120 40 120 56 C120 40 144 24 180 40 C240 72 232 144 120 224 Z" fill="white"/></svg>');
					-webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240"><path d="M120 224 C8 144 0 72 60 40 C96 24 120 40 120 56 C120 40 144 24 180 40 C240 72 232 144 120 224 Z" fill="white"/></svg>');
					mask-size: contain;
					-webkit-mask-size: contain;
					mask-repeat: no-repeat;
					-webkit-mask-repeat: no-repeat;
				}
			}

			/* Layer chứa lời chúc bay trên nền pháo hoa */
			.wishes-layer {
				position: absolute;
				inset: 0;
				z-index: 10; /* Hiển thị trên canvas */
				pointer-events: auto; /* Cho phép nhận pointer events để xoay không gian */
				transform-origin: center center;
				transform-style: preserve-3d; /* Cho phép 3D transform */
				will-change: transform; /* Tối ưu performance */
			}

			/* Tắt transition khi đang drag để giảm lag */
			.wishes-layer.dragging {
				transition: none;
			}

			/* Wrapper anim bay lên (dùng transform riêng) */
			.wish-wrapper {
				position: absolute;
				bottom: -3rem;
				/* Pas de left:50% + translateX(-50%) qui déborde — JS gère le left */
				transform: translateX(-50%) translateY(0);
				opacity: 0;
				pointer-events: none;
			}

			/* Câu chúc màu hồng phát sáng, có thể xoay / thu phóng bằng tay */
			.wish-text {
				display: inline-block;
				font-size: 1.1rem;
				padding: 0.4rem 1rem;
				border-radius: 999px;
				color: #ff9ad9;
				text-shadow:
					0 0 6px rgba(255, 105, 180, 0.9),
					0 0 18px rgba(255, 20, 147, 0.8);
				background: rgba(0, 0, 0, 0.3);
				border: 1px solid rgba(255, 192, 203, 0.7);
				box-shadow:
					0 0 14px rgba(255, 105, 180, 0.7),
					0 0 32px rgba(255, 20, 147, 0.4);
				white-space: nowrap;
				max-width: 80vw;
				white-space: normal;
				word-break: break-word;
				transform-origin: center center;
				pointer-events: auto;
			}

			/* Responsive pour mobile */
			@media (max-width: 768px) {
				.wish-text {
					font-size: 0.95rem;
					padding: 0.4rem 1rem;
					max-width: 76vw;
					line-height: 1.5;
				}
			}

			@media (max-width: 480px) {
				.wish-text {
					font-size: 0.85rem;
					padding: 0.35rem 0.85rem;
					max-width: 72vw;
					line-height: 1.4;
				}
			}

			/* Bay chậm đều từ dưới lên trên */
			@keyframes wishFloatUp {
				0% {
					opacity: 0;
					transform: translateX(-50%) translateY(10vh);
				}
				10% {
					opacity: 1;
				}
				75% {
					opacity: 1;
				}
				100% {
					opacity: 0;
					transform: translateX(-50%) translateY(-110vh);
				}
			}

			.wish-animate {
				animation: wishFloatUp 4s linear forwards;
			}

			/* Ảnh bay lên cùng câu chúc */
			.wish-image {
				display: inline-block;
				/* Ratio 3:4 portrait */
				width: clamp(160px, 36vw, 270px);
				height: clamp(213px, 48vw, 360px);
				object-fit: cover;
				border-radius: 16px;
				border: 4px solid rgba(255, 192, 203, 1);
				box-shadow:
					0 0 30px rgba(255, 105, 180, 1),
					0 0 60px rgba(255, 20, 147, 0.8),
					0 0 90px rgba(255, 20, 147, 0.5),
					inset 0 0 30px rgba(255, 192, 203, 0.4);
				transform-origin: center center;
				pointer-events: auto;
				animation: imageGlow 2s ease-in-out infinite alternate;
			}

			/* Mode portrait */
			@media (orientation: portrait) {
				.wish-image {
					width: clamp(180px, 52vw, 300px);
					height: clamp(240px, 69vw, 400px);
				}
			}

			/* Petit écran portrait */
			@media (orientation: portrait) and (max-width: 400px) {
				.wish-image {
					width: clamp(150px, 46vw, 220px);
					height: clamp(200px, 61vw, 293px);
				}
			}

			/* Hiệu ứng phát sáng cho ảnh */
			@keyframes imageGlow {
				0% {
					box-shadow:
						0 0 20px rgba(255, 105, 180, 0.8),
						0 0 40px rgba(255, 20, 147, 0.6),
						0 0 60px rgba(255, 20, 147, 0.4),
						inset 0 0 20px rgba(255, 192, 203, 0.3);
					border-color: rgba(255, 192, 203, 0.9);
				}
				100% {
					box-shadow:
						0 0 30px rgba(255, 105, 180, 1),
						0 0 60px rgba(255, 20, 147, 0.9),
						0 0 90px rgba(255, 20, 147, 0.7),
						inset 0 0 30px rgba(255, 192, 203, 0.5);
					border-color: rgba(255, 255, 255, 1);
				}
			}

			/* Wrapper pour images volantes */
			.wish-image-wrapper {
				position: absolute;
				bottom: -3rem;
				transform: translateX(-50%) translateY(0);
				opacity: 0;
				pointer-events: none;
			}

			/* Ẩn nút pause và nút cài đặt */
			.pause-btn,
			.settings-btn {
				display: none !important;
			}

			/* Đảm bảo các nút điều khiển vẫn có thể click được */
			.controls {
				pointer-events: auto !important;
				position: relative;
				z-index: 20;
			}

			/* Đảm bảo menu vẫn có thể click được */
			.menu {
				pointer-events: auto !important;
				position: relative;
				z-index: 20;
			}

			/* ===== BEAUTIFUL MOBILE START SCREEN ===== */
			.start-button-container {
				background: radial-gradient(ellipse at center, #1a0020 0%, #0d0010 50%, #000 100%) !important;
				overflow: hidden;
			}

			.start-content {
				position: relative;
				z-index: 2;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 2.5rem;
				padding: 2rem 1.5rem;
				text-align: center;
			}

			.start-title-neon {
				font-family: 'Fredoka One', cursive;
				font-size: clamp(2.2rem, 11vw, 4.5rem);
				line-height: 1.25;
				color: #ff9ad9;
				text-shadow:
					0 0 10px rgba(255, 105, 180, 1),
					0 0 30px rgba(255, 20, 147, 0.9),
					0 0 60px rgba(255, 20, 147, 0.7),
					0 0 100px rgba(255, 20, 147, 0.5),
					4px 4px 0 rgba(255, 107, 157, 0.4);
				animation: neonPulse 2s ease-in-out infinite alternate;
			}

			@keyframes neonPulse {
				from {
					text-shadow:
						0 0 10px rgba(255, 105, 180, 1),
						0 0 30px rgba(255, 20, 147, 0.9),
						0 0 60px rgba(255, 20, 147, 0.6),
						0 0 100px rgba(255, 20, 147, 0.4);
				}
				to {
					text-shadow:
						0 0 20px rgba(255, 105, 180, 1),
						0 0 50px rgba(255, 20, 147, 1),
						0 0 90px rgba(255, 20, 147, 0.8),
						0 0 140px rgba(255, 20, 147, 0.6),
						0 0 200px rgba(255, 20, 147, 0.4);
				}
			}

			.start-button {
				font-size: clamp(1.2rem, 5vw, 2rem) !important;
				padding: 1rem 3rem !important;
				border-radius: 999px !important;
				animation: buttonGlow 1.5s ease-in-out infinite alternate;
				letter-spacing: 3px !important;
			}

			@keyframes buttonGlow {
				from { box-shadow: 0 0 14px rgba(255,105,180,0.7), 0 0 32px rgba(255,20,147,0.4); }
				to   { box-shadow: 0 0 28px rgba(255,105,180,1),   0 0 60px rgba(255,20,147,0.8), 0 0 100px rgba(255,20,147,0.4); }
			}

			.start-subtitle {
				font-family: 'Dancing Script', cursive;
				font-size: clamp(1rem, 4vw, 1.4rem);
				color: rgba(255, 192, 203, 0.7);
				letter-spacing: 1px;
				animation: fadeInOut 3s ease-in-out infinite;
			}

			@keyframes fadeInOut {
				0%, 100% { opacity: 0.4; }
				50% { opacity: 1; }
			}

			/* Intro overlay */
			.intro-overlay {
				position: fixed;
				inset: 0;
				background: rgba(0, 0, 0, 0.85);
				z-index: 1000;
				display: flex;
				align-items: center;
				justify-content: center;
				opacity: 1;
				transition: opacity 0.5s ease-out;
				overflow: hidden;
			}

			.intro-overlay .intro-text {
			    /* 1. Reset ukuran kotak agar pas dengan layar */
			    width: 100%;
			    max-width: 100vw;
			    box-sizing: border-box; /* PENTING: Biar padding gak bikin kotak melebar ke kanan */
			    padding: 0 0.5rem; /* Kasih jarak aman 1rem di kiri dan kanan */

			    /* 2. Ukuran font dinamis (Magic-nya di sini) */
			    /* Artinya: Minimal ukuran 1.5rem, idealnya 10% dari lebar layar, maksimal 5rem */
			    font-size: clamp(2rem, 10vw, 5rem); 

			    /* 3. Posisi dan Teks */
			    text-align: center;
			    white-space: pre-line; /* Tetap pertahankan ini untuk membaca \n dari JS */
			    word-wrap: normal;
			    word-break: keep-all;

			    /* Biarkan efek text-shadow kamu yang lama di bawah sini */
			    font-family: 'Fredoka One', cursive !important;
			    font-weight: 400;
			    color: #ff9ad9;
			    text-shadow:
			        4px 4px 0 rgba(255, 107, 157, 0.8),
			        8px 8px 0 rgba(196, 69, 105, 0.6),
			        12px 12px 15px rgba(0, 0, 0, 0.5),
			        0 0 15px rgba(255, 105, 180, 1),
			        0 0 40px rgba(255, 20, 147, 0.9),
			        0 0 70px rgba(255, 20, 147, 0.8),
			        0 0 100px rgba(255, 20, 147, 0.6),
			        0 0 150px rgba(255, 20, 147, 0.4),
			        0 0 200px rgba(255, 20, 147, 0.3);
			}

			.intro-overlay.hide {
				opacity: 0;
				pointer-events: none;
			}

			/* Nút Start */
			.start-button-container {
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: rgba(0, 0, 0, 0.85);
				display: flex;
				align-items: center;
				justify-content: center;
				z-index: 1001;
				transition: opacity 0.5s ease-out;
			}

			.start-button-container.hide {
				opacity: 0;
				pointer-events: none;
			}

			.start-button {
				display: inline-block;
				font-family: 'Fredoka One', cursive !important;
				font-size: 3rem;
				font-weight: 400;
				padding: 1.5rem 4rem;
				border-radius: 999px;
				color: #ff9ad9;
				text-shadow:
					0 0 6px rgba(255, 105, 180, 0.9),
					0 0 18px rgba(255, 20, 147, 0.8);
				background: rgba(0, 0, 0, 0.3);
				border: 1px solid rgba(255, 192, 203, 0.7);
				box-shadow:
					0 0 14px rgba(255, 105, 180, 0.7),
					0 0 32px rgba(255, 20, 147, 0.4);
				cursor: pointer;
				transition: all 0.3s ease;
				text-transform: uppercase;
				letter-spacing: 2px;
			}

			.start-button:hover {
				transform: scale(1.05);
				border-color: rgba(255, 192, 203, 1);
				box-shadow:
					0 0 20px rgba(255, 105, 180, 0.9),
					0 0 40px rgba(255, 20, 147, 0.6);
			}

			.start-button:active {
				transform: scale(0.95);
			}

			/* Intro text - chỉ phát sáng chữ, không có viền khung */
			.intro-text {
				display: inline-block;
				font-family: 'Fredoka One', cursive !important;
				font-size: 5rem;
				font-weight: 400;
				padding: 1.5rem 3rem;
				color: #ff9ad9;
				text-shadow:
					4px 4px 0 rgba(255, 107, 157, 0.8),
					8px 8px 0 rgba(196, 69, 105, 0.6),
					12px 12px 15px rgba(0, 0, 0, 0.5),
					0 0 15px rgba(255, 105, 180, 1),
					0 0 40px rgba(255, 20, 147, 0.9),
					0 0 70px rgba(255, 20, 147, 0.8),
					0 0 100px rgba(255, 20, 147, 0.6),
					0 0 150px rgba(255, 20, 147, 0.4),
					0 0 200px rgba(255, 20, 147, 0.3);
				background: transparent;
				border: none;
				box-shadow: none;
				transform-origin: center center;
				letter-spacing: 4px;
				/* text-transform: uppercase; */
				text-align: center;
				width: 100%;
			}

			/* Số đếm ngược */
			.intro-countdown {
				font-family: 'Fredoka One', cursive !important;
				font-size: 10rem;
				font-weight: 100;
				letter-spacing: 4px;
			}

			/* Animation cho intro - đơn giản, tinh tế với phát sáng tỏa rộng */
			@keyframes introAppear {
				0% {
					transform: scale(1.5);
					opacity: 0;
					text-shadow:
						0 0 5px rgba(255, 105, 180, 0.5),
						0 0 10px rgba(255, 20, 147, 0.4);
				}
				20% {
					transform: scale(1);
					opacity: 1;
					text-shadow:
						0 0 15px rgba(255, 105, 180, 1),
						0 0 40px rgba(255, 20, 147, 0.9),
						0 0 70px rgba(255, 20, 147, 0.8),
						0 0 100px rgba(255, 20, 147, 0.6),
						0 0 150px rgba(255, 20, 147, 0.4),
						0 0 200px rgba(255, 20, 147, 0.3);
				}
				50% {
					text-shadow:
						0 0 20px rgba(255, 105, 180, 1),
						
				}
				80%, 100% {
					transform: scale(1);
					opacity: 1;
				}
			}

			.intro-text.animate-appear {
				animation: introAppear 1s ease-out forwards;
			}

			/* Animation riêng cho HAPPY NEW YEAR - hiệu ứng in-out đẹp */
			@keyframes happyNewYearIn {
				0% {
					transform: scale(0.3) translateY(50px);
					opacity: 0;
					filter: blur(10px);
					text-shadow:
						0 0 5px rgba(255, 105, 180, 0.3),
						0 0 10px rgba(255, 20, 147, 0.2);
				}
				50% {
					transform: scale(1.1) translateY(-10px);
					opacity: 0.9;
					filter: blur(2px);
					text-shadow:
						0 0 20px rgba(255, 105, 180, 0.9),
						0 0 50px rgba(255, 20, 147, 0.8),
						0 0 90px rgba(255, 20, 147, 0.6);
				}
				100% {
					transform: scale(1) translateY(0);
					opacity: 1;
					filter: blur(0);
					text-shadow:
						0 0 15px rgba(255, 105, 180, 1),
						0 0 40px rgba(255, 20, 147, 0.9),
						0 0 70px rgba(255, 20, 147, 0.8),
						0 0 100px rgba(255, 20, 147, 0.6),
						0 0 150px rgba(255, 20, 147, 0.4),
						0 0 200px rgba(255, 20, 147, 0.3);
				}
			}

			@keyframes happyNewYearOut {
				0% {
					transform: scale(1) translateY(0);
					opacity: 1;
					filter: blur(0);
				}
				20% {
					transform: scale(1.1) translateY(-10px);
					opacity: 1;
					filter: blur(0);
				}
				40% {
					transform: scale(1.3) translateY(-20px);
					opacity: 0.9;
					filter: blur(1px);
				}
				60% {
					transform: scale(1.8) translateY(-40px);
					opacity: 0.7;
					filter: blur(2px);
				}
				80% {
					transform: scale(2.5) translateY(-60px);
					opacity: 0.4;
					filter: blur(4px);
				}
				100% {
					transform: scale(4) translateY(-100px);
					opacity: 0;
					filter: blur(8px);
				}
			}

			/* Class riêng cho HAPPY NEW YEAR */
			.intro-text.happy-new-year.animate-appear {
				animation: happyNewYearIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
			}

			.intro-text.happy-new-year.fade-out {
				animation: happyNewYearOut 2.5s ease-out forwards;
				transform-origin: center center;
			}

			/* Responsive cho intro */
			@media (max-width: 768px) {
				.intro-text {
					font-size: 5rem;
					padding: 1rem 1.5rem;
					letter-spacing: 2px;
					text-align: center;
				}

				.intro-countdown {
					font-size: 8rem;
					letter-spacing: 2px;
				}

				.start-button {
					font-size: 2rem;
					padding: 1rem 2.5rem;
				}
			}

			@media (max-width: 480px) {
				.intro-text {
					font-size: 3.5rem;
					padding: 0.8rem 1rem;
					letter-spacing: 1px;
					text-align: center;
				}

				.intro-countdown {
					font-size: 6rem;
					letter-spacing: 1px;
				}

				.start-button {
					font-size: 1.5rem;
					padding: 0.8rem 2rem;
				}
			}
			#orientation-lock {
  		    display: none !important;
  		}

			/* Mode portrait sur mobile */
			@media (orientation: portrait) and (max-width: 768px) {
				.start-button {
					font-size: 1.8rem;
					padding: 1rem 2.5rem;
				}
				.intro-text {
					font-size: clamp(2.5rem, 12vw, 5rem);
					padding: 0.8rem 1rem;
				}
				.intro-countdown {
					font-size: clamp(4rem, 20vw, 8rem);
				}
				.wish-text {
					font-size: 0.85rem;
					max-width: 90vw;
					white-space: normal;
					word-break: break-word;
				}
				.stop-wishes-text-btn {
					font-size: 0.9rem;
					padding: 0.5rem 1.2rem;
					bottom: 8%;
				}
			}

		/* Styling Tombol Stop Wishes (Teks Transparan & Posisi Bawah Tengah) */
		.stop-wishes-text-btn {
		    position: fixed;
		    bottom: 12%; /* Jarak dari bawah, agak ke atas sedikit */
		    left: 50%;
		    transform: translateX(-50%); /* Agar persis di tengah secara horizontal */
		    font-family: 'Fredoka One', cursive !important;
		    font-size: 1.2rem;
		    padding: 0.8rem 2rem;
		    border-radius: 999px;
		
		    /* Warna teks dan background transparan */
		    color: rgba(255, 154, 217, 0.8); 
		    background: rgba(0, 0, 0, 0.4); 
		    border: 1px solid rgba(255, 192, 203, 0.4);
		    box-shadow: 0 0 10px rgba(255, 105, 180, 0.2);
		
		    /* Efek blur ala glassmorphism biar estetik */
		    backdrop-filter: blur(4px);
		    -webkit-backdrop-filter: blur(4px);
		
		    cursor: pointer;
		    z-index: 100; /* Pastikan tombol selalu bisa di-klik di atas kanvas */
		    transition: all 0.3s ease;
		    text-transform: uppercase;
		    letter-spacing: 2px;
		}

		/* Efek saat kursor menyentuh tombol (Hover) */
		.stop-wishes-text-btn:hover {
		    background: rgba(0, 0, 0, 0.6);
		    color: #ff9ad9;
		    border-color: rgba(255, 192, 203, 0.8);
		    box-shadow: 0 0 15px rgba(255, 105, 180, 0.6);
		    transform: translateX(-50%) scale(1.05); /* Membesar sedikit, tapi tetap di tengah */
		}

		/* Efek saat tombol diklik (Active) */
		.stop-wishes-text-btn:active {
		    transform: translateX(-50%) scale(0.95);
		}

		<script>
			// --- Logika untuk menyembunyikan tombol HIDE WISHES setelah diklik ---
            const stopWishesBtn = document.querySelector('.stop-wishes-text-btn');
            
            if (stopWishesBtn) {
                stopWishesBtn.addEventListener('click', function() {
                    // Kode ini membuat tombol menghilang secara perlahan
                    this.style.opacity = '0';
                    this.style.pointerEvents = 'none';
                    
                    // (Opsional) Hapus sepenuhnya dari dokumen setelah animasinya selesai
                    setTimeout(() => {
                        this.style.display = 'none';
                    }, 300);
                });
            }
            // --- Orientation: toutes orientations autorisées (portrait ET paysage) ---
            let isLandscape = true;
            function checkOrientation() {
                const orientationLock = document.getElementById('orientation-lock');
                const mainCanvas = document.querySelector('.canvas-container');

                // Toujours cacher le verrou d'orientation et afficher le site
                if(orientationLock) orientationLock.style.display = 'none';
                if(mainCanvas) mainCanvas.style.display = 'block';
                if(typeof startWebsite === 'function') startWebsite();

                // Redimensionner lors du changement d'orientation
                window.addEventListener('orientationchange', () => {
                    setTimeout(() => {
                        if(typeof forceResizeMatrix === 'function') forceResizeMatrix();
                        window.dispatchEvent(new Event('resize'));
                    }, 200);
                });

                window.addEventListener('resize', () => {
                    setTimeout(() => {
                        if(typeof forceResizeMatrix === 'function') forceResizeMatrix();
                    }, 100);
                });
            }

            // --- Particules flottantes sur l'écran de démarrage ---
            (function() {
                const canvas = document.getElementById('particle-canvas');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let particles = [];
                function resize() {
                    canvas.width = canvas.offsetWidth;
                    canvas.height = canvas.offsetHeight;
                }
                resize();
                window.addEventListener('resize', resize);

                const hearts = ['💗','💖','✨','🌸','💕','⭐','🎀'];
                for (let i = 0; i < 35; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        size: 10 + Math.random() * 18,
                        speedX: (Math.random() - 0.5) * 0.6,
                        speedY: -0.3 - Math.random() * 0.7,
                        opacity: 0.2 + Math.random() * 0.6,
                        symbol: hearts[Math.floor(Math.random() * hearts.length)],
                        wobble: Math.random() * Math.PI * 2,
                        wobbleSpeed: 0.02 + Math.random() * 0.03,
                    });
                }

                function animateParticles() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach(p => {
                        p.wobble += p.wobbleSpeed;
                        p.x += p.speedX + Math.sin(p.wobble) * 0.4;
                        p.y += p.speedY;
                        if (p.y < -30) {
                            p.y = canvas.height + 10;
                            p.x = Math.random() * canvas.width;
                        }
                        ctx.globalAlpha = p.opacity;
                        ctx.font = p.size + 'px serif';
                        ctx.fillText(p.symbol, p.x, p.y);
                    });
                    ctx.globalAlpha = 1;
                    requestAnimationFrame(animateParticles);
                }
                animateParticles();
            })();

            // --- Setup Audio & Tombol Start ---
            const bgMusic = new Audio('music/music.mp3');
            bgMusic.loop = true; // Musik diulang terus menerus
            let isPlaying = false;

            const startBtnContainer = document.getElementById('startButtonContainer');
            const startBtn = document.getElementById('startButton');

            if (startBtn) {
                startBtn.addEventListener('click', () => {
                    // 1. Sembunyikan container tombol start
                    startBtnContainer.classList.add('hide');

                    // 2. Mainkan musik
                    if (!isPlaying) {
                        bgMusic.play().then(() => {
                            isPlaying = true;
                            // Ubah icon sound di pojok (jika ada) menjadi mode ON
                            const soundIcon = document.querySelector('.sound-btn use');
                            if (soundIcon) {
                                soundIcon.setAttribute('href', '#icon-sound-on');
                                soundIcon.setAttribute('xlink:href', '#icon-sound-on');
                            }
                        }).catch(error => {
                            console.log("Browser memblokir autoplay audio:", error);
                        });
                    }

                    // Catatan: Pastikan animasi intro text (3, 2, 1) di-trigger dari js/script.js 
                    // atau berjalan otomatis setelah startBtnContainer disembunyikan.
                });
            }

            // --- Toggle Play/Pause Musik dari Tombol Pengaturan ---
            const soundBtn = document.querySelector('.sound-btn');
            if (soundBtn) {
                soundBtn.addEventListener('click', () => {
                    const soundIcon = soundBtn.querySelector('use');
                    if (isPlaying) {
                        bgMusic.pause();
                        isPlaying = false;
                        soundIcon.setAttribute('href', '#icon-sound-off');
                        soundIcon.setAttribute('xlink:href', '#icon-sound-off');
                    } else {
                        bgMusic.play();
                        isPlaying = true;
                        soundIcon.setAttribute('href', '#icon-sound-on');
                        soundIcon.setAttribute('xlink:href', '#icon-sound-on');
                    }
                });
            }
        </script>
